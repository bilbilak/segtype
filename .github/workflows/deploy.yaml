name: Deploy to Pages

on:
  push:
    branches: [main]
    paths:
      - 'demo/**'
      - 'src/**'
      - 'package.json'
      - 'tsconfig.json'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: |
          mkdir -p _site
          cp -r demo/* _site/
          cp -r dist _site/dist
          cp .github/assets/segtype-icon.png _site/favicon.png
          sed -i -E "s/(2024–)[0-9]{4}/\1$(date +%Y)/" _site/index.html
          sed -i 's|\.\./dist/|./dist/|' _site/app.js
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
